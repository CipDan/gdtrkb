name: DB preview branch

# Spin up an isolated Neon branch per PR (a copy-on-write clone of production,
# so it already carries the schema), reassert the seed into it, and delete the
# branch when the PR closes. This turns a seed change into a real load test
# against a production-shaped database, with zero risk to prod.
#
# Requires: secret NEON_API_KEY and variable NEON_PROJECT_ID — both created for
# you by the Neon GitHub integration (see docs/ci-deploy-setup.md §6) — plus a
# repo variable NEON_DB_ROLE naming the Neon owner/migration role (the same
# role behind DATABASE_URL_MIGRATIONS elsewhere in this project, NOT the
# read-only gdtrkb_ro role): create-branch-action needs it to build a
# connection string that can run 02_seed.sql's TRUNCATE + INSERT statements.
#
# Because the branch inherits production's schema, this reapplies ONLY
# db/02_seed.sql (idempotent via its leading TRUNCATE). A PR that changes
# db/01_schema.sql is not exercised here — apply the schema delta separately.

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: db-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  reseed-branch:
    # Skip (don't fail) until Neon is wired. NEON_PROJECT_ID and NEON_DB_ROLE
    # are repo *variables* (NEON_PROJECT_ID created alongside NEON_API_KEY by
    # the Neon GitHub integration; NEON_DB_ROLE set by hand — see the file
    # header), so their presence is a reliable proxy for "credentials/config
    # exist." Note: the secrets context is NOT available in a job-level if, so
    # we can't test the API key directly here — the variables are the thing
    # we can check.
    if: >-
      github.event.action != 'closed' &&
      vars.NEON_PROJECT_ID != '' &&
      vars.NEON_DB_ROLE != ''
    runs-on: ubuntu-latest   # psql ships preinstalled on ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create / update the PR's Neon branch
        id: branch
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.number }}
          username: ${{ vars.NEON_DB_ROLE }}
          api_key: ${{ secrets.NEON_API_KEY }}
      - name: Reseed the branch
        env:
          DATABASE_URL: ${{ steps.branch.outputs.db_url }}
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/02_seed.sql

  delete-branch:
    if: >- 
      github.event.action == 'closed' &&
      vars.NEON_PROJECT_ID != ''
    runs-on: ubuntu-latest
    steps:
      - name: Delete the PR's Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.number }}
          api_key: ${{ secrets.NEON_API_KEY }}
